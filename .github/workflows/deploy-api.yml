name: Deploy API

on:
  push:
    branches:
      - main
      - codex/user-module-integration
    paths:
      - ".github/workflows/deploy-api.yml"
      - "Dockerfile"
      - "tsconfig.base.json"
      - "backend/api/**"
      - "ops/api/**"
      - "packages/auth/**"
      - "packages/contracts/**"
      - "packages/db/**"
      - "packages/shared/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/option-tool-api
  HEALTHCHECK_URL: https://api.tonylaw.cc/health

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  build-image:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build API image
        run: |
          docker build \
            --tag "$IMAGE_NAME:${{ github.sha }}" \
            --tag "$IMAGE_NAME:${{ github.ref_name }}" \
            .

      - name: Push API image
        run: |
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:${{ github.ref_name }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.API_DEPLOY_SSH_KEY }}" > ~/.ssh/api_deploy_key
          chmod 600 ~/.ssh/api_deploy_key
          ssh-keyscan -H "${{ secrets.API_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy API on VPS
        run: |
          ssh -i ~/.ssh/api_deploy_key \
            "${{ secrets.API_DEPLOY_USER }}@${{ secrets.API_DEPLOY_HOST }}" \
            "GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN='${{ github.token }}' API_IMAGE='$IMAGE_NAME:${{ github.sha }}' DEPLOY_BRANCH='${{ github.ref_name }}' /opt/tonylaw/option-tool/ops/api/deploy.sh"

  health-check:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for API health
        run: |
          for attempt in {1..20}; do
            if curl -fsSL "$HEALTHCHECK_URL"; then
              exit 0
            fi

            echo "Waiting for API health... ($attempt/20)"
            sleep 3
          done

          echo "API health check failed"
          exit 1
