services:
  postgres:
    image: postgres:16
    container_name: tonylaw-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: tonylaw_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tonylaw_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
