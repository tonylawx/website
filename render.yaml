services:
  - type: web
    name: api
    runtime: docker
    plan: free
    domains:
      - api.tonylaw.cc
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SERVICE_NAME
        value: api
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_INTERNAL_KEY
        sync: false
      - key: AUTH_COOKIE_DOMAIN
        value: .tonylaw.cc
      - key: AUTH_APP_URL
        value: https://auth.tonylaw.cc
      - key: AUTH_API_URL
        value: https://api.tonylaw.cc/auth
      - key: AUTH_BOOTSTRAP_EMAIL
        sync: false
      - key: AUTH_BOOTSTRAP_PASSWORD
        sync: false
      - key: AUTH_BOOTSTRAP_NAME
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tonylaw-postgres
          property: connectionString
      - key: LONGBRIDGE_APP_KEY
        sync: false
      - key: LONGBRIDGE_APP_SECRET
        sync: false
      - key: LONGBRIDGE_ACCESS_TOKEN
        sync: false
      - key: LONGBRIDGE_LANGUAGE
        value: zh-CN
databases:
  - name: tonylaw-postgres
    plan: free
