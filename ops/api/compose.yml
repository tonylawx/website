services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - /etc/tonylaw/api.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /etc/tonylaw/api.env
    environment:
      NODE_ENV: production
      API_PORT: "3001"
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
